version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tareas_db_container
    restart: always
    environment:
      MYSQL_DATABASE: tareas_db
      MYSQL_ROOT_PASSWORD: password # Cambia esto por una contraseña segura en producción
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: tareas_backend_container
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=password
      - DB_NAME=tareas_db
      - DB_PORT=3306
      - JWT_SECRET=supersecretkey123
      - JWT_EXPIRES_IN=1d
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
